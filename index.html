<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="canvas:aspect-ratio" content="4:3">
<title>小小汉字乐园</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@600;700;800;900&family=Noto+Sans+SC:wght@400;500;600;700;900&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/hanzi-writer@3.5/dist/hanzi-writer.min.js"></script>
<style>
/* ===== Design Tokens (Cozy Kids) ===== */
:root {
  --seed-bg: #F8F8F0;
  --seed-fg: #725D42;
  --seed-primary: #19C8B9;
  --seed-accent: #FFCC00;
  --seed-surface: #F7F3DF;
  --seed-radius: 20px;
  --char-display-size: 96px;

  --kids-cream: var(--seed-bg);
  --kids-card: var(--seed-surface);
  --kids-secondary: #F0E8D8;
  --kids-title: #794F27;
  --kids-text: var(--seed-fg);
  --kids-muted: #9F927D;
  --kids-disabled: #C4B89E;
  --kids-primary: var(--seed-primary);
  --kids-primary-hover: #3DD4C6;
  --kids-primary-active: #11A89B;
  --kids-primary-wash: #E6F9F6;
  --kids-focus: var(--seed-accent);
  --kids-focus-shadow: #E0B800;
  --kids-success: #6FBA2C;
  --kids-success-shadow: #5A9E1E;
  --kids-warning: #F5C31C;
  --kids-danger: #E05A5A;
  --kids-button-shadow: #BDAEA0;
  --kids-input-shadow: #D4C9B4;
  --kids-white: #FFFFFF;
  --kids-focus-hover: #FFD633;
  --kids-bg-overlay: rgba(248, 248, 240, 0.75);
  --kids-primary-border: rgba(25, 200, 185, 0.25);
  --kids-glow-primary: rgba(25, 200, 185, 0.06);
  --kids-glow-accent: rgba(255, 204, 0, 0.06);
  --kids-glow-success: rgba(111, 186, 44, 0.05);
  --kids-card-shadow: rgba(107, 92, 66, 0.12);

  --radius-control: 50px;
  --radius-control-small: 12px;
  --radius-card: var(--seed-radius);
  --radius-panel: 24px;
  --shadow-button-rest: 0 5px 0 0 var(--kids-button-shadow);
  --shadow-button-hover: 0 6px 0 0 var(--kids-button-shadow);
  --shadow-button-active: 0 1px 0 0 var(--kids-button-shadow);
  --shadow-card: 0 4px 10px var(--kids-card-shadow);
  --motion-fast: 0.15s;
  --motion-base: 0.25s;
  --motion-slow: 0.35s;
  --motion-ease: cubic-bezier(0.4, 0, 0.2, 1);
}

/* ===== Reset & Base ===== */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  height: 100%;
  overflow: hidden;
  -webkit-tap-highlight-color: transparent;
  -webkit-touch-callout: none;
  -webkit-user-select: none;
  user-select: none;
}

body {
  font-family: 'Nunito', 'Noto Sans SC', -apple-system, BlinkMacSystemFont, "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
  background: var(--kids-cream);
  color: var(--kids-text);
  font-weight: 500;
  display: flex;
  flex-direction: column;
  align-items: center;
  position: relative;
}

/* ===== Decorative Background ===== */
body::before {
  content: '';
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background:
    radial-gradient(ellipse 120px 80px at 8% 15%, var(--kids-glow-primary) 0%, transparent 70%),
    radial-gradient(ellipse 100px 100px at 92% 80%, var(--kids-glow-accent) 0%, transparent 70%),
    radial-gradient(ellipse 80px 60px at 50% 95%, var(--kids-glow-success) 0%, transparent 70%);
  pointer-events: none;
  z-index: 0;
}

/* ===== Header ===== */
.header {
  width: 100%;
  max-width: 800px;
  padding: 16px 24px 8px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: relative;
  z-index: 1;
  flex-shrink: 0;
}

.app-title {
  font-family: 'Nunito', 'Noto Sans SC', sans-serif;
  font-size: 22px;
  font-weight: 800;
  color: var(--kids-title);
  display: flex;
  align-items: center;
  gap: 8px;
}

.app-title .star-icon {
  display: inline-block;
  width: 26px;
  height: 26px;
}

.progress-badge {
  background: var(--kids-card);
  border: 2.5px solid var(--kids-input-shadow);
  border-radius: var(--radius-control);
  padding: 6px 18px;
  font-size: 14px;
  font-weight: 700;
  color: var(--kids-muted);
  box-shadow: 0 3px 0 0 var(--kids-input-shadow);
}

.progress-badge .current-num {
  color: var(--kids-primary);
  font-weight: 800;
}

/* ===== Main Content ===== */
.main-content {
  flex: 1;
  width: 100%;
  max-width: 800px;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 0 20px;
  position: relative;
  z-index: 1;
  overflow: hidden;
}

/* ===== Character Display Area ===== */
.char-display {
  text-align: center;
  padding: 12px 0 8px;
  flex-shrink: 0;
}

.char-main {
  font-family: 'Noto Sans SC', sans-serif;
  font-size: var(--char-display-size);
  font-weight: 900;
  color: var(--kids-title);
  line-height: 1.1;
  cursor: pointer;
  transition: transform var(--motion-base) var(--motion-ease);
  display: inline-block;
}

.char-main:hover {
  transform: scale(1.05);
}

.char-main:active {
  transform: scale(0.97);
}

.char-pinyin {
  font-family: 'Nunito', sans-serif;
  font-size: 22px;
  font-weight: 700;
  color: var(--kids-primary);
  margin-top: 2px;
  letter-spacing: 0.02em;
}

.char-words {
  display: flex;
  gap: 10px;
  justify-content: center;
  margin-top: 8px;
  flex-wrap: wrap;
}

.word-chip {
  background: var(--kids-primary-wash);
  border: 2px solid var(--kids-primary-border);
  border-radius: var(--radius-control);
  padding: 4px 16px;
  font-size: 16px;
  font-weight: 600;
  color: var(--kids-primary-active);
}

.sound-hint {
  font-size: 12px;
  color: var(--kids-muted);
  margin-top: 6px;
  font-weight: 500;
}

/* ===== Action Area (Animation & Practice) ===== */
.action-area {
  flex: 1;
  width: 100%;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  position: relative;
  min-height: 0;
}

.action-card {
  background: var(--kids-card);
  border-radius: var(--radius-panel);
  box-shadow: var(--shadow-card);
  width: 100%;
  max-width: 380px;
  aspect-ratio: 1;
  position: relative;
  overflow: hidden;
  display: flex;
  align-items: center;
  justify-content: center;
}

.action-card .writer-container {
  width: 100%;
  height: 100%;
  display: flex;
  align-items: center;
  justify-content: center;
}

.action-card .writer-container svg {
  max-width: 90%;
  max-height: 90%;
}

/* Mode label */
.mode-label {
  position: absolute;
  top: 12px;
  left: 50%;
  transform: translateX(-50%);
  background: var(--kids-secondary);
  border-radius: var(--radius-control);
  padding: 4px 16px;
  font-size: 13px;
  font-weight: 700;
  color: var(--kids-muted);
  z-index: 2;
}

.mode-label.active-practice {
  background: var(--kids-primary-wash);
  color: var(--kids-primary-active);
}

/* Replay button */
.replay-btn {
  position: absolute;
  bottom: 12px;
  right: 12px;
  width: 48px;
  height: 48px;
  border-radius: 50%;
  background: var(--kids-primary);
  color: var(--kids-white);
  border: none;
  cursor: pointer;
  font-size: 20px;
  display: flex;
  align-items: center;
  justify-content: center;
  box-shadow: var(--shadow-button-rest);
  transition: all var(--motion-fast) var(--motion-ease);
  z-index: 2;
}

.replay-btn:hover {
  background: var(--kids-primary-hover);
  transform: translateY(-1px);
  box-shadow: var(--shadow-button-hover);
}

.replay-btn:active {
  transform: translateY(2px);
  box-shadow: var(--shadow-button-active);
}

/* ===== Bottom Controls ===== */
.bottom-controls {
  width: 100%;
  max-width: 800px;
  padding: 12px 20px 20px;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 12px;
  flex-shrink: 0;
  position: relative;
  z-index: 1;
}

.btn {
  border: none;
  cursor: pointer;
  font-family: 'Nunito', 'Noto Sans SC', sans-serif;
  font-weight: 700;
  transition: all var(--motion-fast) var(--motion-ease);
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  -webkit-tap-highlight-color: transparent;
}

.btn:focus-visible {
  outline: 2px solid var(--kids-primary);
  outline-offset: 2px;
}

/* Nav buttons */
.btn-nav {
  height: 52px;
  padding: 0 22px;
  font-size: 15px;
  border-radius: var(--radius-control);
  background: var(--kids-card);
  color: var(--kids-text);
  border: 2.5px solid var(--kids-input-shadow);
  box-shadow: var(--shadow-button-rest);
}

.btn-nav:hover {
  background: var(--kids-secondary);
  transform: translateY(-1px);
  box-shadow: var(--shadow-button-hover);
}

.btn-nav:active {
  transform: translateY(2px);
  box-shadow: var(--shadow-button-active);
}

.btn-nav:disabled {
  opacity: 0.5;
  cursor: not-allowed;
  transform: none;
  box-shadow: 0 3px 0 0 var(--kids-input-shadow);
}

/* Primary action buttons */
.btn-primary {
  height: 52px;
  padding: 0 28px;
  font-size: 16px;
  border-radius: var(--radius-control);
  background: var(--kids-primary);
  color: var(--kids-white);
  box-shadow: var(--shadow-button-rest);
}

.btn-primary:hover {
  background: var(--kids-primary-hover);
  transform: translateY(-1px);
  box-shadow: var(--shadow-button-hover);
}

.btn-primary:active {
  background: var(--kids-primary-active);
  transform: translateY(2px);
  box-shadow: var(--shadow-button-active);
}

/* Sound button */
.btn-sound {
  height: 52px;
  padding: 0 22px;
  font-size: 15px;
  border-radius: var(--radius-control);
  background: var(--kids-focus);
  color: var(--kids-title);
  box-shadow: 0 5px 0 0 var(--kids-focus-shadow);
}

.btn-sound:hover {
  background: var(--kids-focus-hover);
  transform: translateY(-1px);
  box-shadow: 0 6px 0 0 var(--kids-focus-shadow);
}

.btn-sound:active {
  transform: translateY(2px);
  box-shadow: 0 1px 0 0 var(--kids-focus-shadow);
}

/* ===== Celebration Overlay ===== */
.celebration-overlay {
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  z-index: 100;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  pointer-events: none;
  opacity: 0;
  transition: opacity var(--motion-base) var(--motion-ease);
}

.celebration-overlay.active {
  opacity: 1;
  pointer-events: auto;
}

.celebration-overlay .bg-dim {
  position: absolute;
  top: 0; left: 0; right: 0; bottom: 0;
  background: var(--kids-bg-overlay);
}

.celebration-content {
  position: relative;
  z-index: 1;
  text-align: center;
}

.celebration-emoji {
  font-size: 80px;
  animation: celebBounce 0.6s var(--motion-ease) both;
}

.celebration-text {
  font-family: 'Nunito', 'Noto Sans SC', sans-serif;
  font-size: 32px;
  font-weight: 900;
  color: var(--kids-title);
  margin-top: 12px;
  animation: celebFadeUp 0.5s var(--motion-ease) 0.2s both;
}

.celebration-sub {
  font-size: 18px;
  font-weight: 600;
  color: var(--kids-muted);
  margin-top: 8px;
  animation: celebFadeUp 0.5s var(--motion-ease) 0.35s both;
}

.celebration-next-btn {
  margin-top: 24px;
  animation: celebFadeUp 0.5s var(--motion-ease) 0.5s both;
  pointer-events: auto;
}

/* Retry toast */
.retry-toast {
  position: fixed;
  bottom: 100px;
  left: 50%;
  transform: translateX(-50%) translateY(20px);
  background: var(--kids-card);
  border: 2.5px solid var(--kids-input-shadow);
  border-radius: var(--radius-control);
  padding: 12px 28px;
  font-size: 16px;
  font-weight: 700;
  color: var(--kids-text);
  box-shadow: var(--shadow-card);
  opacity: 0;
  transition: all var(--motion-slow) var(--motion-ease);
  z-index: 90;
  pointer-events: none;
  white-space: nowrap;
}

.retry-toast.show {
  opacity: 1;
  transform: translateX(-50%) translateY(0);
}

/* ===== Canvas for celebration particles ===== */
#celeb-canvas {
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  pointer-events: none;
  z-index: 101;
}

/* ===== Animations ===== */
@keyframes celebBounce {
  0% { transform: scale(0.3); opacity: 0; }
  50% { transform: scale(1.15); }
  100% { transform: scale(1); opacity: 1; }
}

@keyframes celebFadeUp {
  0% { transform: translateY(16px); opacity: 0; }
  100% { transform: translateY(0); opacity: 1; }
}

@keyframes gentlePulse {
  0%, 100% { transform: scale(1); }
  50% { transform: scale(1.04); }
}

/* ===== Responsive ===== */
@media (max-width: 600px) {
  .header { padding: 12px 16px 6px; }
  .app-title { font-size: 18px; }
  .app-title .star-icon { width: 22px; height: 22px; }
  .progress-badge { font-size: 12px; padding: 4px 14px; }
  .char-main { font-size: 72px; }
  .char-pinyin { font-size: 18px; }
  .word-chip { font-size: 14px; padding: 3px 12px; }
  .action-card { max-width: 300px; }
  .bottom-controls { gap: 8px; padding: 10px 16px 16px; }
  .btn-nav, .btn-primary, .btn-sound { height: 48px; font-size: 14px; padding: 0 16px; }
  .celebration-text { font-size: 26px; }
}

@media (min-width: 601px) and (max-width: 1024px) {
  .char-main { font-size: 88px; }
}

@media (min-height: 900px) {
  .char-display { padding: 20px 0 12px; }
  .action-card { max-width: 420px; }
}

/* ===== Reduced Motion ===== */
@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after {
    animation-duration: 0.01ms !important;
    transition-duration: 0.01ms !important;
  }
}

/* ===== Loading State ===== */
.loading-screen {
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: var(--kids-cream);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  z-index: 200;
  transition: opacity 0.4s ease;
}

.loading-screen.hidden {
  opacity: 0;
  pointer-events: none;
}

.loading-char {
  font-family: 'Noto Sans SC', sans-serif;
  font-size: 64px;
  font-weight: 900;
  color: var(--kids-title);
  animation: gentlePulse 1.2s ease infinite;
}

.loading-text {
  margin-top: 16px;
  font-size: 16px;
  font-weight: 600;
  color: var(--kids-muted);
}

/* ===== Decorative dots ===== */
.deco-dots {
  display: flex;
  gap: 6px;
  justify-content: center;
  margin-top: 4px;
}

.deco-dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: var(--kids-input-shadow);
}

.deco-dot:nth-child(2) { background: var(--kids-primary); opacity: 0.4; }
.deco-dot:nth-child(3) { background: var(--kids-focus); opacity: 0.5; }

/* ===== Character Library Panel ===== */
.lib-overlay {
  position: fixed;
  inset: 0;
  z-index: 9000;
  background: rgba(0,0,0,0.4);
  display: none;
  align-items: center;
  justify-content: center;
  padding: 16px;
}
.lib-overlay.active { display: flex; }

.lib-panel {
  background: var(--kids-cream);
  border-radius: var(--seed-radius);
  width: 100%;
  max-width: 500px;
  max-height: 85vh;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  box-shadow: 0 8px 32px rgba(0,0,0,0.15);
}

.lib-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 16px 20px;
  border-bottom: 2px solid var(--kids-secondary);
}
.lib-header h2 {
  font: 700 18px/1.2 'Noto Sans SC', sans-serif;
  color: var(--kids-title);
  margin: 0;
}
.lib-close {
  background: var(--kids-danger);
  color: #fff;
  border: none;
  width: 32px;
  height: 32px;
  border-radius: 50%;
  font-size: 16px;
  cursor: pointer;
  box-shadow: 0 3px 0 #B84444;
}

.lib-grid {
  display: grid;
  grid-template-columns: repeat(6, 1fr);
  gap: 8px;
  padding: 16px 20px;
  overflow-y: auto;
  flex: 1;
}
.lib-char-card {
  position: relative;
  background: var(--kids-card);
  border-radius: 12px;
  aspect-ratio: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  font: 700 24px/1 'Noto Sans SC', sans-serif;
  color: var(--kids-text);
  cursor: default;
  box-shadow: 0 2px 0 var(--kids-input-shadow);
}
.lib-char-card .lib-pinyin {
  font: 500 10px/1 'Nunito', sans-serif;
  color: var(--kids-muted);
  margin-top: 2px;
}
.lib-char-card .lib-del {
  position: absolute;
  top: 2px;
  right: 2px;
  width: 18px;
  height: 18px;
  border-radius: 50%;
  background: var(--kids-danger);
  color: #fff;
  border: none;
  font-size: 11px;
  line-height: 18px;
  text-align: center;
  cursor: pointer;
  opacity: 0.7;
  padding: 0;
}
.lib-char-card .lib-del:hover { opacity: 1; }
.lib-char-card.has-audio::after {
  content: '';
  position: absolute;
  bottom: 3px;
  right: 3px;
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: var(--kids-success);
}

.lib-footer {
  padding: 12px 20px 16px;
  border-top: 2px solid var(--kids-secondary);
}
.lib-add-form {
  display: flex;
  gap: 8px;
  align-items: center;
}
.lib-add-form input {
  flex: 1;
  height: 40px;
  border: 2px solid var(--kids-input-shadow);
  border-radius: 10px;
  padding: 0 10px;
  font: 600 15px/1 'Noto Sans SC', sans-serif;
  background: #fff;
  color: var(--kids-text);
  outline: none;
}
.lib-add-form input:focus { border-color: var(--kids-primary); }
.lib-add-form input::placeholder { color: var(--kids-disabled); }
.lib-add-btn {
  height: 40px;
  padding: 0 14px;
  background: var(--kids-primary);
  color: #fff;
  border: none;
  border-radius: 10px;
  font: 700 14px/1 'Noto Sans SC', sans-serif;
  cursor: pointer;
  box-shadow: 0 3px 0 var(--kids-primary-active);
  white-space: nowrap;
}
.lib-add-btn:active { transform: translateY(2px); box-shadow: 0 1px 0 var(--kids-primary-active); }
.lib-count {
  font: 500 12px/1 'Noto Sans SC', sans-serif;
  color: var(--kids-muted);
  margin-bottom: 8px;
}

/* ===== Library Button in Header ===== */
.btn-lib {
  background: var(--kids-focus);
  color: var(--kids-title);
  border: none;
  padding: 6px 12px;
  border-radius: 12px;
  font: 700 13px/1 'Noto Sans SC', sans-serif;
  cursor: pointer;
  box-shadow: 0 3px 0 var(--kids-focus-shadow);
  margin-left: 8px;
}
.btn-lib:active { transform: translateY(2px); box-shadow: 0 1px 0 var(--kids-focus-shadow); }
</style>
</head>
<body>

<!-- Loading Screen -->
<div class="loading-screen" id="loading-screen">
  <div class="loading-char">字</div>
  <div class="loading-text">小小汉字乐园准备中...</div>
</div>

<!-- Header -->
<header class="header" data-component="app-header">
  <div class="app-title">
    <svg class="star-icon" viewBox="0 0 26 26" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M13 2L15.8 9.2L23.5 9.8L17.6 14.8L19.4 22.3L13 18.2L6.6 22.3L8.4 14.8L2.5 9.8L10.2 9.2L13 2Z" style="fill: var(--kids-focus); stroke: var(--kids-focus-shadow); stroke-width: 1.5; stroke-linejoin: round;"/>
    </svg>
    小小汉字乐园
  </div>
  <div class="progress-badge">
    <span class="current-num" id="progress-current">1</span> / <span id="progress-total">30</span>
  </div>
  <button class="btn-lib" id="btn-lib" title="管理字库">字库</button>
</header>

<!-- Debug Panel (temporary, for sound troubleshooting) -->
<div id="debug-panel" style="display:block;position:fixed;top:0;left:0;right:0;z-index:99999;background:#222;color:#0f0;font:11px/1.4 monospace;padding:6px 10px;max-height:40vh;overflow:auto;">
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px;">
    <strong style="color:#ff0;">语音调试面板</strong>

<script>
// ===== Design Token Colors (mirrors CSS :root tokens) =====
const COLORS = {

// ===== Character Data =====
const DEFAULT_CHARACTERS = [

  { char: '小', pinyin: 'xiǎo', words: ['小鸟', '大小', '小心'] },
  { char: '上', pinyin: 'shàng', words: ['上面', '上学', '上去'] },
  { char: '下', pinyin: 'xià', words: ['下面', '下雨', '下去'] },
  { char: '人', pinyin: 'rén', words: ['人们', '大人', '人口'] },
  { char: '口', pinyin: 'kǒu', words: ['开口', '口水', '人口'] },
  { char: '手', pinyin: 'shǒu', words: ['小手', '手心', '手心'] },
  { char: '足', pinyin: 'zú', words: ['手足', '足球', '双足'] },
  { char: '日', pinyin: 'rì', words: ['日子', '日月', '生日'] },
  { char: '月', pinyin: 'yuè', words: ['月亮', '月光', '日月'] },
  { char: '水', pinyin: 'shuǐ', words: ['水果', '口水', '山水'] },
  { char: '火', pinyin: 'huǒ', words: ['火车', '大火', '火山'] },
  { char: '山', pinyin: 'shān', words: ['山水', '大山', '山上'] },
  { char: '石', pinyin: 'shí', words: ['石头', '石子', '玉石'] },
  { char: '田', pinyin: 'tián', words: ['田地', '水田', '田野'] },
  { char: '土', pinyin: 'tǔ', words: ['土地', '泥土', '国土'] },
  { char: '木', pinyin: 'mù', words: ['树木', '木头', '木材'] },
  { char: '花', pinyin: 'huā', words: ['花朵', '花园', '开花'] },
  { char: '左', pinyin: 'zuǒ', words: ['左右', '左边', '左手'] },
  { char: '右', pinyin: 'yòu', words: ['左右', '右边', '右手'] }
];

// Load character library from localStorage, or use defaults
let CHARACTERS;
try {
  const saved = localStorage.getItem('hanzi_library');
  CHARACTERS = saved ? JSON.parse(saved) : null;
  if (!Array.isArray(CHARACTERS) || CHARACTERS.length === 0) CHARACTERS = DEFAULT_CHARACTERS.slice();
} catch(e) {
  CHARACTERS = DEFAULT_CHARACTERS.slice();
}

function saveLibrary() {
  try { localStorage.setItem('hanzi_library', JSON.stringify(CHARACTERS)); } catch(e) {}
}

// ===== State =====
let currentIndex = 0;
let currentMode = 'view'; // 'view' | 'animate' | 'practice'
let writer = null;
let isQuizMode = false;
let quizCompleted = false;

// ===== DOM Elements =====
const charMainEl = document.getElementById('char-main');
const pinyinEl = document.getElementById('char-pinyin');
const wordsEl = document.getElementById('char-words');
const writerContainer = document.getElementById('writer-container');
const modeLabel = document.getElementById('mode-label');
const replayBtn = document.getElementById('replay-btn');
const btnPrev = document.getElementById('btn-prev');
const btnNext = document.getElementById('btn-next');
const btnSound = document.getElementById('btn-sound');
const btnMode = document.getElementById('btn-mode');
const celebOverlay = document.getElementById('celebration-overlay');
const celebCanvas = document.getElementById('celeb-canvas');
const retryToast = document.getElementById('retry-toast');
const progressCurrent = document.getElementById('progress-current');
const progressTotal = document.getElementById('progress-total');
const loadingScreen = document.getElementById('loading-screen');
const celebNextBtn = document.getElementById('celeb-next-btn');

// ===== Initialize =====
progressTotal.textContent = CHARACTERS.length;

function init() {
  loadCharacter(0);
  loadingScreen.classList.add('hidden');
  setTimeout(() => { loadingScreen.style.display = 'none'; }, 500);
}

// ===== Load Character =====
function loadCharacter(index) {
  currentIndex = index;
  const data = CHARACTERS[index];
  quizCompleted = false;
  isQuizMode = false;
  currentMode = 'animate';

  // Update display
  charMainEl.textContent = data.char;
  pinyinEl.textContent = data.pinyin;
  progressCurrent.textContent = index + 1;

  // Update words
  wordsEl.innerHTML = '';
  data.words.forEach(w => {
    const chip = document.createElement('span');
    chip.className = 'word-chip';
    chip.textContent = w;
    wordsEl.appendChild(chip);
  });

  // Update buttons
  btnPrev.disabled = index === 0;
  btnNext.disabled = index === CHARACTERS.length - 1;
  btnMode.textContent = '我来写';
  modeLabel.textContent = '看笔画';
  modeLabel.classList.remove('active-practice');
  replayBtn.style.display = 'flex';

  // Create HanziWriter
  createWriter(data.char, false);
}

// ===== Create HanziWriter =====
function createWriter(char, isQuiz) {
  writerContainer.innerHTML = '';

  const cardEl = document.getElementById('action-card');
  const cardSize = cardEl.offsetWidth || 340;
  const writerSize = Math.min(cardSize * 0.85, 320);

  try {
    writer = HanziWriter.create('writer-container', char, {
      width: writerSize,
      height: writerSize,
      padding: 20,
      showOutline: true,
      showCharacter: false,
      strokeColor: COLORS.text,
      outlineColor: COLORS.inputShadow,
      drawingColor: COLORS.primary,
      strokeAnimationSpeed: 1,
      delayBetweenStrokes: 300,
      drawingWidth: 4,
      showHintAfterMisses: 3,
      highlightOnComplete: true,
      highlightColor: COLORS.primary,
      charDataLoader: HanziWriter.loadCharacterData
    });

    if (!isQuiz) {
      // Auto-play animation
      setTimeout(() => {
        if (writer) writer.animateCharacter({ strokeAnimationSpeed: 1 });
      }, 300);
    }

    return writer;
  } catch (e) {
    console.error('HanziWriter error:', e);
    writerContainer.innerHTML = '<div style="color:var(--kids-muted);font-size:14px;padding:20px;text-align:center;">加载笔画数据中...</div>';
    return null;
  }
}

// ===== Speech (Baidu TTS + Youdao Fallback + Web Speech API) =====
let audioCtx = null;
let debugLog = [];
let persistentAudio = null;

function addDebug(msg) {
  debugLog.push('[' + new Date().toLocaleTimeString() + '] ' + msg);
  if (debugLog.length > 30) debugLog.shift();
  updateDebugPanel();
}

function updateDebugPanel() {
  const el = document.getElementById('debug-content');
  if (!el) return;
  const hasSynth = 'speechSynthesis' in window;
  let info = 'speechSynthesis: ' + hasSynth + '\n';
  info += 'audioCtx: ' + (audioCtx ? audioCtx.state : 'null') + '\n';
  info += 'engine: local -> baidu -> webspeech\n';
  info += '---log---\n' + debugLog.join('\n');
  el.textContent = info;
}

// --- Audio Unlock ---
function unlockAudio() {
  try {
    if (!audioCtx) {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      addDebug('AudioContext created: ' + audioCtx.state);
    }
    if (audioCtx.state === 'suspended') {
      audioCtx.resume();
      addDebug('AudioContext resumed');
    }
    const buf = audioCtx.createBuffer(1, 1, 22050);
    const src = audioCtx.createBufferSource();
    src.buffer = buf;
    src.connect(audioCtx.destination);
    src.start(0);
  } catch(e) {
    addDebug('AudioContext error: ' + e.message);
  }
  if (!persistentAudio) {
    persistentAudio = document.createElement('audio');
    persistentAudio.preload = 'auto';
    persistentAudio.style.display = 'none';
    document.body.appendChild(persistentAudio);
  }
}
document.addEventListener('touchstart', unlockAudio, { passive: true });
document.addEventListener('click', unlockAudio);
document.addEventListener('keydown', unlockAudio);

// --- Pre-generated audio map ---
const CHARS_WITH_AUDIO = ['一','二','三','四','五','六','七','八','九','十','大','小','上','下','人','口','手','足','日','月','水','火','山','石','田','土','木','花','左','右'];

// --- Engine 1: Local audio files (most reliable on mobile) ---
function playLocalAudio(url) {
  addDebug('Playing local: ' + url);
  return new Promise((resolve, reject) => {
    const a = new Audio(url);
    a.volume = 1.0;
    a.preload = 'auto';
    const playPromise = a.play();
    if (playPromise) {
      playPromise.then(() => {
        addDebug('Local OK: ' + url);
        a.onended = () => resolve();
        setTimeout(() => resolve(), 5000);
      }).catch((e) => {
        addDebug('Local failed: ' + e.message);
        reject(e);
      });
    } else {
      reject(new Error('no promise'));
    }
  });
}

// --- Engine 2: Baidu TTS fallback ---
function speakViaBaidu(text) {
  const url = 'https://fanyi.baidu.com/gettts?lan=zh&text=' + encodeURIComponent(text) + '&spd=3&source=web';
  addDebug('Baidu TTS fallback...');
  const a = new Audio(url);
  a.volume = 1.0;
  const p = a.play();
  if (p) p.then(() => addDebug('Baidu OK')).catch(() => addDebug('Baidu failed too'));
}

// --- Engine 3: Web Speech API (last resort) ---
function speakViaWebSpeech(text, rate) {
  if (!('speechSynthesis' in window)) { addDebug('No speechSynthesis'); return; }
  window.speechSynthesis.cancel();
  const voices = window.speechSynthesis.getVoices();
  const voice = voices.find(v => v.lang === 'zh-CN') || voices.find(v => v.lang.startsWith('zh')) || voices[0];
  if (!voice) { addDebug('No voice'); return; }
  const u = new SpeechSynthesisUtterance(text);
  u.lang = voice.lang; u.rate = rate || 0.8; u.volume = 1.0; u.voice = voice;
  window.speechSynthesis.speak(u);
}

// --- Main speak function ---
function speak(text, rate) {
  addDebug('speak(): "' + text.substring(0, 20) + '"');
  unlockAudio();

  // Single character with local audio
  if (text.length === 1 && CHARS_WITH_AUDIO.includes(text)) {
    playLocalAudio('audio/' + text + '.mp3').catch(() => speakViaBaidu(text));
    return;
  }
  // Praise phrase
  if (text.includes('太棒了') || text.includes('你太棒')) {
    playLocalAudio('audio/praise.mp3').catch(() => speakViaBaidu(text));
    return;
  }
  // Encouragement phrase
  if (text.includes('加油')) {
    playLocalAudio('audio/encourage.mp3').catch(() => speakViaBaidu(text));
    return;
  }
  // Longer text starting with a known character - play character audio
  if (text.length > 1 && CHARS_WITH_AUDIO.includes(text[0])) {
    playLocalAudio('audio/' + text[0] + '.mp3').catch(() => speakViaBaidu(text));
    return;
  }
  // Default: Baidu TTS
  speakViaBaidu(text);
}

// --- Debug Panel ---
let tapCount = 0, tapTimer = null;
document.querySelector('.app-title').addEventListener('click', () => {
  tapCount++;
  clearTimeout(tapTimer);
  tapTimer = setTimeout(() => { tapCount = 0; }, 500);
  if (tapCount >= 3) {
    tapCount = 0;
    const panel = document.getElementById('debug-panel');
    panel.style.display = panel.style.display === 'none' ? 'block' : 'none';
    updateDebugPanel();
  }
});
document.getElementById('debug-test-btn').addEventListener('click', () => {
  addDebug('--- TEST BUTTON ---');
  unlockAudio();
  speak('一', 0.8);
});
setTimeout(updateDebugPanel, 3000);

// ===== Mode Switching =====
function switchToPractice() {
  const data = CHARACTERS[currentIndex];
  isQuizMode = true;
  currentMode = 'practice';
  modeLabel.textContent = '我来写';
  modeLabel.classList.add('active-practice');
  replayBtn.style.display = 'none';
  btnMode.textContent = '看笔画';

  // Create quiz mode writer
  writerContainer.innerHTML = '';
  const cardEl = document.getElementById('action-card');
  const cardSize = cardEl.offsetWidth || 340;
  const writerSize = Math.min(cardSize * 0.85, 320);

  try {
    writer = HanziWriter.create('writer-container', data.char, {
      width: writerSize,
      height: writerSize,
      padding: 20,
      showOutline: true,
      showCharacter: false,
      strokeColor: COLORS.text,
      outlineColor: COLORS.inputShadow,
      drawingColor: COLORS.primary,
      drawingWidth: 6,
      showHintAfterMisses: 3,
      highlightOnComplete: true,
      highlightColor: COLORS.primary,
      charDataLoader: HanziWriter.loadCharacterData
    });

    writer.quiz({
      onCorrectStroke: function() {
        // Small visual feedback - stroke is highlighted automatically
      },
      onMistake: function() {
        showRetryToast();
      },
      onComplete: function(summary) {
        if (summary.totalMistakes === 0 || summary.mistakes === undefined || (summary.totalMistakes / summary.totalStrokes) < 2) {
          // Good job - celebrate
          setTimeout(() => showCelebration(), 400);
        } else {
          // Too many mistakes - encourage retry
          showRetryToast();
          setTimeout(() => switchToPractice(), 2000);
        }
      }
    });
  } catch (e) {
    console.error('Quiz mode error:', e);
  }
}

function switchToAnimate() {
  const data = CHARACTERS[currentIndex];
  isQuizMode = false;
  currentMode = 'animate';
  modeLabel.textContent = '看笔画';
  modeLabel.classList.remove('active-practice');
  replayBtn.style.display = 'flex';
  btnMode.textContent = '我来写';
  createWriter(data.char, false);
}

// ===== Celebration =====
function showCelebration() {
  quizCompleted = true;
  celebOverlay.classList.add('active');

  // Play cheer sound effect first, then praise speech
  playLocalAudio('audio/cheer.wav').catch(() => {});
  speak('小豆豆 你太棒了！', 0.9);

  // Start particle animation
  startCelebrationParticles();
}

function hideCelebration() {
  celebOverlay.classList.remove('active');
  stopCelebrationParticles();
}

// ===== Retry Toast =====
function showRetryToast() {
  retryToast.classList.add('show');
  playLocalAudio('audio/encourage_fx.wav').catch(() => {});
  speak('小豆豆 加油啊', 0.9);
  setTimeout(() => {
    retryToast.classList.remove('show');
  }, 2500);
}

// ===== Particle Celebration =====
let particles = [];
let particleAnimId = null;
const ctx = celebCanvas.getContext('2d');

function startCelebrationParticles() {
  celebCanvas.width = window.innerWidth;
  celebCanvas.height = window.innerHeight;
  particles = [];

  const colors = [COLORS.focus, COLORS.primary, COLORS.success, COLORS.pink, COLORS.purple, COLORS.blue, COLORS.orange, COLORS.red];

  for (let i = 0; i < 60; i++) {
    particles.push({
      x: Math.random() * celebCanvas.width,
      y: -20 - Math.random() * 200,
      size: 4 + Math.random() * 8,
      color: colors[Math.floor(Math.random() * colors.length)],
      speedX: (Math.random() - 0.5) * 3,
      speedY: 2 + Math.random() * 4,
      rotation: Math.random() * Math.PI * 2,
      rotSpeed: (Math.random() - 0.5) * 0.15,
      shape: Math.random() > 0.5 ? 'star' : 'circle',
      opacity: 0.8 + Math.random() * 0.2
    });
  }

  animateParticles();
}

function animateParticles() {
  ctx.clearRect(0, 0, celebCanvas.width, celebCanvas.height);

  particles.forEach(p => {
    p.x += p.speedX;
    p.y += p.speedY;
    p.rotation += p.rotSpeed;
    p.speedY += 0.05; // gravity

    if (p.y > celebCanvas.height + 20) {
      p.y = -20;
      p.x = Math.random() * celebCanvas.width;
      p.speedY = 2 + Math.random() * 4;
    }

    ctx.save();
    ctx.translate(p.x, p.y);
    ctx.rotate(p.rotation);
    ctx.globalAlpha = p.opacity;

    if (p.shape === 'star') {
      drawStar(ctx, 0, 0, 5, p.size, p.size * 0.5, p.color);
    } else {
      ctx.beginPath();
      ctx.arc(0, 0, p.size / 2, 0, Math.PI * 2);
      ctx.fillStyle = p.color;
      ctx.fill();
    }

    ctx.restore();
  });

  particleAnimId = requestAnimationFrame(animateParticles);
}

function drawStar(ctx, cx, cy, spikes, outerR, innerR, color) {
  let rot = Math.PI / 2 * 3;
  let step = Math.PI / spikes;
  ctx.beginPath();
  ctx.moveTo(cx, cy - outerR);
  for (let i = 0; i < spikes; i++) {
    ctx.lineTo(cx + Math.cos(rot) * outerR, cy + Math.sin(rot) * outerR);
    rot += step;
    ctx.lineTo(cx + Math.cos(rot) * innerR, cy + Math.sin(rot) * innerR);
    rot += step;
  }
  ctx.lineTo(cx, cy - outerR);
  ctx.closePath();
  ctx.fillStyle = color;
  ctx.fill();
}

function stopCelebrationParticles() {
  if (particleAnimId) {
    cancelAnimationFrame(particleAnimId);
    particleAnimId = null;
  }
  ctx.clearRect(0, 0, celebCanvas.width, celebCanvas.height);
  particles = [];
}

// ===== Event Listeners =====

// Click character to hear pronunciation
charMainEl.addEventListener('click', () => {
  const data = CHARACTERS[currentIndex];
  speak(data.char + '，' + data.words.join('、'), 0.75);
});

charMainEl.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' || e.key === ' ') {
    e.preventDefault();
    charMainEl.click();
  }
});

// Sound button
btnSound.addEventListener('click', () => {
  const data = CHARACTERS[currentIndex];
  speak(data.char + '，' + data.words.join('、'), 0.75);
});

// Mode toggle
btnMode.addEventListener('click', () => {
  if (isQuizMode) {
    switchToAnimate();
  } else {
    switchToPractice();
  }
});

// Replay
replayBtn.addEventListener('click', () => {
  if (writer && !isQuizMode) {
    writer.animateCharacter({ strokeAnimationSpeed: 1 });
  }
});

// Navigation
btnPrev.addEventListener('click', () => {
  if (currentIndex > 0) {
    loadCharacter(currentIndex - 1);
  }
});

btnNext.addEventListener('click', () => {
  if (currentIndex < CHARACTERS.length - 1) {
    loadCharacter(currentIndex + 1);
  }
});

// Celebration next button
celebNextBtn.addEventListener('click', () => {
  hideCelebration();
  if (currentIndex < CHARACTERS.length - 1) {
    loadCharacter(currentIndex + 1);
  } else {
    // Finished all characters
    speak('小豆豆 你好厉害 所有字都学完啦', 0.85);
  }
});

// ===== Handle resize =====
let resizeTimer;
window.addEventListener('resize', () => {
  clearTimeout(resizeTimer);
  resizeTimer = setTimeout(() => {
    if (isQuizMode) {
      switchToPractice();
    } else {
      switchToAnimate();
    }
  }, 300);
});

// ===== Character Library Management =====
function renderLibGrid() {
  const grid = document.getElementById('lib-grid');
  grid.innerHTML = '';
  CHARACTERS.forEach((item, idx) => {
    const card = document.createElement('div');
    card.className = 'lib-char-card' + (CHARS_WITH_AUDIO.includes(item.char) ? ' has-audio' : '');
    card.innerHTML = '<span>' + item.char + '</span>'
      + '<span class="lib-pinyin">' + item.pinyin + '</span>'
      + '<button class="lib-del" data-idx="' + idx + '">×</button>';
    grid.appendChild(card);
  });
  grid.querySelectorAll('.lib-del').forEach(btn => {
    btn.addEventListener('click', (e) => {
      e.stopPropagation();
      removeCharacter(parseInt(btn.dataset.idx));
    });
  });
  document.getElementById('lib-count').textContent = '共 ' + CHARACTERS.length + ' 个汉字';
}

function addCharacter(ch) {
  if (CHARACTERS.some(c => c.char === ch)) return false;
  CHARACTERS.push({ char: ch, pinyin: '', words: [ch] });
  saveLibrary();
  renderLibGrid();
  progressTotal.textContent = CHARACTERS.length;
  return true;
}

function removeCharacter(idx) {
  if (idx < 0 || idx >= CHARACTERS.length) return;
  CHARACTERS.splice(idx, 1);
  saveLibrary();
  renderLibGrid();
  progressTotal.textContent = CHARACTERS.length;
  if (currentIndex >= CHARACTERS.length) {
    loadCharacter(Math.max(0, CHARACTERS.length - 1));
  } else if (currentIndex === idx) {
    loadCharacter(Math.min(idx, CHARACTERS.length - 1));
  }
}

function resetLibrary() {
  CHARACTERS = DEFAULT_CHARACTERS.slice();
  saveLibrary();
  renderLibGrid();
  progressTotal.textContent = CHARACTERS.length;
  loadCharacter(0);
}

// Library panel event listeners
document.getElementById('btn-lib').addEventListener('click', () => {
  renderLibGrid();
  document.getElementById('lib-overlay').classList.add('active');
});
document.getElementById('lib-close').addEventListener('click', () => {
  document.getElementById('lib-overlay').classList.remove('active');
});
document.getElementById('lib-overlay').addEventListener('click', (e) => {
  if (e.target.id === 'lib-overlay') {
    document.getElementById('lib-overlay').classList.remove('active');
  }
});
document.getElementById('lib-add-btn').addEventListener('click', () => {
  const input = document.getElementById('lib-input');
  const ch = input.value.trim();
  if (ch && ch.length === 1 && /[\u4e00-\u9fff]/.test(ch)) {
    if (addCharacter(ch)) {
      input.value = '';
    } else {
      input.value = '';
      input.placeholder = '已存在！';
      setTimeout(() => { input.placeholder = '输入汉字，如：鸟'; }, 1500);
    }
  } else {
    input.placeholder = '请输入一个汉字';
    setTimeout(() => { input.placeholder = '输入汉字，如：鸟'; }, 1500);
  }
});
document.getElementById('lib-input').addEventListener('keydown', (e) => {
  if (e.key === 'Enter') document.getElementById('lib-add-btn').click();
});

// ===== Start =====
window.addEventListener('load', () => {
  // Wait a moment for hanzi-writer data to be available
  setTimeout(init, 500);
});
</script>

  <div class="lib-panel">

      <h2>字库管理</h2>
      <button class="lib-close" id="lib-close">×</button>
    </div>
    <div class="lib-grid" id="lib-grid"></div>
    <div class="lib-footer">
      <div class="lib-count" id="lib-count"></div>
      <div class="lib-add-form">
        <input type="text" id="lib-input" placeholder="输入汉字，如：鸟" maxlength="1">
        <button class="lib-add-btn" id="lib-add-btn">添加</button>
      </div>
    </div>
  </div>
</div>
